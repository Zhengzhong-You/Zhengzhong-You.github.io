baseURL: "https://zhengzhong-you.github.io/"
title: Zhengzhong You
theme: PaperMod

enableInlineShortcodes: true
enableRobotsTXT: true
pagination:
  pagerSize: 20

taxonomies:
  tag: tags

menu:
  main:
    - name: Papers
      url: papers/
      weight: 2
    - name: Software
      url: software/
      weight: 3
    - name: Talks
      url: talks/
      weight: 4
    - name: CV
      url: cv.pdf
      weight: 5
    - name: Archive
      url: archive/
      weight: 6

params:
  description: "Personal website of Zhengzhong You, an operations research researcher working on exact and learning-augmented optimization for routing, scheduling, and inventory systems."
  author: Zhengzhong You
  keywords:
    - operations research
    - exact optimization
    - branch-price-and-cut
    - vehicle routing
    - learning to branch
    - RouteOpt
  DateFormat: "January 2006"
  defaultTheme: light
  hideFooter: false
  disableThemeToggle: true
  ShowShareButtons: false
  ShowReadingTime: false
  disableSpecial1stPost: true
  disableAnchoredHeadings: true
  ShowPostNavLinks: true
  ShowBreadCrumbs: false
  ShowCodeCopyButtons: true
  ShowAllPagesInArchive: false
  mainSections: ["papers", "software", "talks"]
  ShowToc: false
  disableScrollToTop: true
  TocOpen: true
  ShowWordCount: false
  UseHugoToc: true
  comments: false
  math: false
  profileMode:
    enabled: true
    title: Zhengzhong You
    subtitle: |
      I build exact and learning-augmented optimization methods for routing, scheduling, and inventory problems, with an emphasis on branch-price-and-cut, column generation, and research software for large-scale decision systems.

      I received an M.S. in Industrial & Systems Engineering from the University of Florida. My work appears in *Operations Research* and *INFORMS Journal on Computing*, and I am an incoming participant in the MIT-UF-NEU Joint Summer Research Camp.
    imageUrl: "profile-photo.jpeg"
    imageWidth: 210
    imageHeight: 210
    buttons:
      - name: Papers
        url: papers/
      - name: Software
        url: software/
      - name: Talks
        url: talks/
      - name: CV
        url: cv.pdf
      - name: RouteOpt
        url: https://github.com/Zhengzhong-You/RouteOpt

  socialIcons:
    - name: cv
      url: cv.pdf
      title: CV
    - name: email
      url: mailto:youzhengzhong0@gmail.com
      title: Email
    - name: github
      url: https://github.com/Zhengzhong-You
      title: GitHub
    - name: orcid
      url: https://orcid.org/0009-0007-3480-5578
      title: ORCID

  assets:
    disableScrollBarStyle: true
    favicon: portrait-mark.svg
    favicon16x16: portrait-mark.svg
    favicon32x32: portrait-mark.svg
    apple_touch_icon: portrait-mark.svg
    theme_color: "#20344c"
    msapplication_TileColor: "#20344c"
  cover:
    hiddenInList: false
    hiddenInSingle: true
  label:
    text: Zhengzhong You
    icon: portrait-mark.svg
    iconHeight: 22
  footer:
    text: "Exact optimization, software, and logistics research."

markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    guessSyntax: true
    style: autumn
  tableOfContents:
    endLevel: 2
    ordered: false
    startLevel: 2
